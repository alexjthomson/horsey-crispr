<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Horsey Genome Mapper</title>
        <style>
            :root {
                --bg: #23262b;
                --surface: #2b2f36;
                --surface-alt: #343943;
                --surface-soft: #3a404c;
                --border: #454c5a;
                --border-strong: #5b6578;
                --accent: #7dd3fc;
                --accent-strong: #38bdf8;
                --text: #eef2f7;
                --text-soft: #d7dde7;
                --muted: #a1acbb;
                --dim: #7b8595;
                --shadow: rgba(0, 0, 0, 0.28);
                --green-hi: #86efac;
                --red-lo: #fca5a5;
                --A: #facc15;
                --T: #fb7185;
                --C: #60a5fa;
                --G: #4ade80;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: linear-gradient(180deg, #1d2025 0%, var(--bg) 100%);
                color: var(--text);
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                font-size: 14px;
                line-height: 1.5;
                min-height: 100vh;
            }

            #header {
                padding: 18px 14px 10px;
            }

            .header-inner {
                max-width: 1200px;
                margin: 0 auto;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 14px;
                box-shadow: 0 18px 40px var(--shadow);
                padding: 18px 20px;
                display: flex;
                align-items: center;
                gap: 18px;
            }

            #header h1 {
                color: var(--accent);
                font-size: 22px;
                letter-spacing: 0.03em;
                font-weight: 700;
            }

            #header .legend {
                margin-left: auto;
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
                font-size: 13px;
                color: var(--muted);
            }

            #header .legend span b {
                font-size: 13px;
            }

            #app {
                max-width: 1200px;
                margin: 0 auto;
            }

            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 18px;
                margin-bottom: 14px;
                box-shadow: 0 16px 36px var(--shadow);
            }

            .field {
                margin-bottom: 10px;
            }

            .field label {
                display: block;
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 8px;
            }

            .info {
                color: var(--muted);
                font-size: 13px;
                line-height: 1.65;
            }

            .button-row {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 12px;
                align-items: center;
            }

            .toggle-option {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-left: 4px;
                padding: 8px 12px;
                border: 1px solid var(--border-strong);
                border-radius: 10px;
                background: #20242a;
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 600;
            }

            .toggle-option input {
                width: auto;
                margin: 0;
                accent-color: var(--accent-strong);
            }

            .editor-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 12px;
            }

            .helix-editor {
                margin-bottom: 0;
                padding: 14px;
                background: var(--surface-alt);
                border-color: var(--border-strong);
                box-shadow: none;
            }

            .editor-title,
            .result-title {
                color: var(--accent);
                font-weight: 700;
                font-size: 16px;
            }

            .helix-name {
                color: var(--accent);
                font-weight: 700;
                margin-bottom: 10px;
                font-size: 13px;
                letter-spacing: 0.04em;
            }

            .collapsible-toggle {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                background: transparent;
                border: 0;
                color: inherit;
                cursor: pointer;
                padding: 0;
                margin-bottom: 12px;
                text-align: left;
                font: inherit;
            }

            .collapsible-toggle:hover .editor-title {
                color: #bae6fd;
            }

            .collapse-indicator {
                color: var(--muted);
                font-size: 12px;
                font-weight: 600;
            }

            .is-collapsed {
                display: none;
            }

            input,
            textarea {
                background: #20242a;
                border: 1px solid var(--border-strong);
                border-radius: 10px;
                color: var(--text);
                font-family: inherit;
                font-size: 13px;
                padding: 10px 12px;
                width: 100%;
            }

            input:focus,
            textarea:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.16);
            }

            textarea {
                resize: vertical;
                line-height: 1.55;
                min-height: 170px;
            }

            button.btn {
                padding: 9px 16px;
                background: linear-gradient(180deg, #1c4f69 0%, #173d51 100%);
                border: 1px solid var(--accent-strong);
                border-radius: 10px;
                color: var(--text);
                cursor: pointer;
                font-family: inherit;
                font-size: 13px;
                font-weight: 600;
                transition:
                    transform 0.08s ease,
                    filter 0.12s ease;
            }

            button.btn:hover {
                filter: brightness(1.08);
                transform: translateY(-1px);
            }

            button.btn-ghost {
                background: transparent;
                border-color: var(--border-strong);
                color: var(--text-soft);
            }

            .base {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                font-weight: 800;
                line-height: 1;
                flex-shrink: 0;
                user-select: none;
            }

            .base-A {
                background: var(--A);
                color: #1b1b1b;
            }

            .base-T {
                background: var(--T);
                color: #1b1b1b;
            }

            .base-C {
                background: var(--C);
                color: #fff;
            }

            .base-G {
                background: var(--G);
                color: #1b1b1b;
            }

            .base-sm {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }

            .editable-base {
                cursor: pointer;
                box-shadow: inset 0 0 0 1px transparent;
                transition:
                    transform 0.08s ease,
                    box-shadow 0.08s ease;
            }

            .editable-base:hover,
            .editable-base:focus-visible {
                transform: translateY(-1px);
                box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.35),
                    0 0 0 2px rgba(125, 211, 252, 0.65);
                outline: none;
            }

            .result-helix {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 14px 16px;
                margin-bottom: 10px;
                box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
            }

            .result-header {
                display: flex;
                gap: 12px;
                align-items: center;
                flex-wrap: wrap;
            }

            .strand-row {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-bottom: 4px;
                flex-wrap: wrap;
            }

            .strand-label {
                color: var(--dim);
                font-size: 11px;
                font-weight: 700;
                min-width: 26px;
            }

            .result-genes {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 12px;
            }

            .result-gene {
                position: relative;
                background: #232831;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                min-width: 112px;
                cursor: pointer;
                text-align: left;
                color: inherit;
            }

            .result-gene:hover,
            .result-gene:focus-visible {
                border-color: var(--accent) !important;
                outline: none;
                box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.14);
            }

            .result-gene .rpos {
                color: var(--dim);
                font-size: 10px;
                font-weight: 600;
            }

            .result-gene .rname {
                font-size: 11px;
                font-weight: 800;
                margin: 4px 0 6px;
                letter-spacing: 0.02em;
            }

            .result-gene .rval {
                display: flex;
                align-items: center;
                gap: 4px;
                font-size: 11px;
                flex-wrap: wrap;
            }

            .gene-tooltip {
                position: absolute;
                left: 0;
                top: calc(100% + 8px);
                z-index: 20;
                width: min(300px, 60vw);
                padding: 10px 12px;
                background: #1e242c;
                color: var(--text);
                border: 1px solid var(--accent);
                border-radius: 10px;
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
                font-size: 12px;
                line-height: 1.6;
                display: none;
                white-space: normal;
                pointer-events: none;
            }

            .gene-tooltip::before {
                content: "";
                position: absolute;
                top: -5px;
                left: 16px;
                width: 8px;
                height: 8px;
                background: #1e242c;
                border-left: 1px solid var(--accent);
                border-top: 1px solid var(--accent);
                transform: rotate(45deg);
            }

            .result-gene.has-desc:hover .gene-tooltip,
            .result-gene.has-desc:focus-visible .gene-tooltip {
                display: block;
            }

            .muted {
                color: var(--muted);
            }

            .dim {
                color: var(--dim);
            }

            @media (max-width: 720px) {
                .header-inner {
                    flex-direction: column;
                    align-items: flex-start;
                }

                #header .legend {
                    margin-left: 0;
                }
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: #1f2329;
            }

            ::-webkit-scrollbar-thumb {
                background: #596273;
                border-radius: 999px;
            }
        </style>
    </head>

            for (const [name, description] of Object.entries(
                GENE_DESCRIPTIONS,
            )) {
                if (GENES[name]) {
                    GENES[name].desc = description;
                }
            }

            function createElement(tag, attrs = {}, children = []) {
                const element = document.createElement(tag);

                for (const [key, value] of Object.entries(attrs)) {
                    if (value == null) continue;
                    if (key === "class") element.className = value;
                    else if (key === "text") element.textContent = value;
                    else if (key === "html") element.innerHTML = value;
                    else if (key === "value") element.value = value;
                    else if (key === "checked")
                        element.checked = Boolean(value);
                    else if (key === "style") element.style.cssText = value;
                    else if (
                        key.startsWith("on") &&
                        typeof value === "function"
                    )
                        element.addEventListener(key.slice(2), value);
                    else element.setAttribute(key, value);
                }

                for (const child of Array.isArray(children)
                    ? children
                    : [children]) {
                    if (child == null) continue;
                    if (typeof child === "string")
                        element.insertAdjacentHTML("beforeend", child);
                    else element.appendChild(child);
                }

                return element;
            }

            function sanitizeSequence(value) {
                return String(value || "")
                    .toUpperCase()
                    .replace(VALID_BASE_RE, "");
            }

            function normalizeGenome(genome) {
                return genome.map(([strand1 = "", strand2 = ""]) => [
                    sanitizeSequence(strand1),
                    sanitizeSequence(strand2),
                ]);
            }

            function cycleBase(base) {
                const currentIndex = BASES.indexOf(base);
                return BASES[(currentIndex + 1 + BASES.length) % BASES.length];
            }

            function baseChip(base, size = "sm") {
                if (!BASES.includes(base)) {
                    return '<span class="muted">?</span>';
                }
                return `<span class="base base-${base} base-${size}">${base}</span>`;
            }

            function valueColor(value) {
                if (value == null) return "var(--muted)";
                if (value > 0) return "var(--green-hi)";
                if (value < 0) return "var(--red-lo)";
                return "var(--muted)";
            }

            function getGeneValue(gene, base) {
                if (
                    !gene ||
                    !Object.prototype.hasOwnProperty.call(BASE_INDEX, base)
                )
                    return null;
                return gene.g[BASE_INDEX[base]];
            }

            function getHelixIndexFactory() {
                const labelToIndex = new Map();
                let nextDynamicIndex = 0;

                return function getHelixIndex(rawLabel) {
                    const label = String(rawLabel).toUpperCase();

                    if (/^\d{1,2}$/.test(label)) {
                        const index = Number.parseInt(label, 10);
                        return index >= 0 && index < HELIX_COUNT ? index : -1;
                    }

                    if (!labelToIndex.has(label)) {
                        if (nextDynamicIndex >= HELIX_COUNT) return -1;
                        labelToIndex.set(label, nextDynamicIndex++);
                    }

                    return labelToIndex.get(label);
                };
            }

            function parseGenome(text) {
                const genome = EMPTY_GENOME();
                const lines = String(text || "")
                    .trim()
                    .split("\n")
                    .map((line) => line.trim())
                    .filter(Boolean);

                const getHelixIndex = getHelixIndexFactory();
                let currentHelix = -1;

                const patterns = {
                    newFormat: /^([A-Za-z0-9]+)\s*:\s*([atcg]+)$/i,
                    numbered: /^(\d{1,2})\s*:\s*([atcg]+)$/i,
                    verboseBoth:
                        /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)\s*:\s*(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                    verboseFirst:
                        /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)$/i,
                    verboseSecond:
                        /^(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                    bareStrand: /^[atcg]+$/i,
                };

                function assignStrand(index, sequence) {
                    if (index < 0 || index >= HELIX_COUNT) return;
                    if (!genome[index][0]) genome[index][0] = sequence;
                    else genome[index][1] = sequence;
                }

                for (const line of lines) {
                    let match = line.match(patterns.newFormat);
                    if (match) {
                        assignStrand(
                            getHelixIndex(match[1]),
                            match[2].toUpperCase(),
                        );
                        continue;
                    }

                    match = line.match(patterns.numbered);
                    if (match) {
                        assignStrand(
                            Number.parseInt(match[1], 10),
                            match[2].toUpperCase(),
                        );
                        continue;
                    }

                    match = line.match(patterns.verboseBoth);
                    if (match) {
                        currentHelix = getHelixIndex(match[1]);
                        if (currentHelix >= 0) {
                            genome[currentHelix][0] = match[2].toUpperCase();
                            genome[currentHelix][1] = match[3].toUpperCase();
                        }
                        continue;
                    }

                    match = line.match(patterns.verboseFirst);
                    if (match) {
                        currentHelix = getHelixIndex(match[1]);
                        if (currentHelix >= 0) {
                            genome[currentHelix][0] = match[2].toUpperCase();
                        }
                        continue;
                    }

                    match = line.match(patterns.verboseSecond);
                    if (match && currentHelix >= 0) {
                        genome[currentHelix][1] = match[1].toUpperCase();
                        continue;
                    }

                    if (
                        currentHelix >= 0 &&
                        !genome[currentHelix][1] &&
                        patterns.bareStrand.test(line)
                    ) {
                        genome[currentHelix][1] = line.toUpperCase();
                    }
                }

                return normalizeGenome(genome);
            }

            function formatGenomeForExport(genome) {
                const lines = [];
                genome.forEach(([strand1, strand2], helixIndex) => {
                    const label = String(helixIndex).padStart(2, "0");
                    if (strand1) lines.push(`${label}:${strand1}`);
                    if (strand2) lines.push(`${label}:${strand2}`);
                });
                return lines.join("\n");
            }

            function createEditableBase(base, onActivate, label) {
                const button = createElement("button", {

                    text: base,
                });
                button.addEventListener("click", (event) => {
                    event.stopPropagation();
                    onActivate();
                });
                return button;
            }

                const editorToggleLeft = createElement("div");
                const editorTitle = createElement("div", {

                });
                const editorSubtitle = createElement("div", {
                    class: "info",
                    text: "Click any base below to cycle A → T → C → G. Changes update the live analysis and the original pasted genome output.",
                    style: "margin-top:4px",

                editorToggleLeft.appendChild(editorTitle);
                editorToggleLeft.appendChild(editorSubtitle);
                const editorToggleRight = createElement("span", {

                editorToggle.appendChild(editorToggleRight);

                editorCard.appendChild(editorToggle);

                root.innerHTML = "";

                root.appendChild(editorCard);
                root.appendChild(resultsRoot);

                function syncTextAreaFromState() {
                    genomeInput.value = formatGenomeForExport(state.genome);
                }

                function setCopyButtonLabel(label) {
                    copyButton.textContent = label;
                }

                async function copyGenomeToClipboard({
                    temporaryLabel = true,
                } = {}) {
                    syncTextAreaFromState();

                    try {
                        await navigator.clipboard.writeText(genomeInput.value);
                        if (temporaryLabel) {
                            setCopyButtonLabel("Copied");
                            window.setTimeout(() => {
                                setCopyButtonLabel("Copy Genome");
                            }, 1200);
                        }
                        return true;
                    } catch {
                        if (temporaryLabel) {
                            genomeInput.focus();
                            genomeInput.select();
                            setCopyButtonLabel("Select & Copy");
                            window.setTimeout(() => {
                                setCopyButtonLabel("Copy Genome");
                            }, 1200);
                        }
                        return false;
                    }
                }

                function maybeAutoCopy() {
                    if (!state.autoCopy) return;
                    void copyGenomeToClipboard({ temporaryLabel: true });
                }

                function updateEditorCollapseUI() {
                    editorBody.classList.toggle(
                        "is-collapsed",
                        state.editorCollapsed,
                    );
                    editorToggleRight.textContent = state.editorCollapsed
                        ? "[ expand ]"
                        : "[ collapse ]";
                    editorToggle.setAttribute(
                        "aria-expanded",
                        String(!state.editorCollapsed),
                    );
                }

                function setBase(helixIndex, strandIndex, baseIndex, nextBase) {
                    const strand = state.genome[helixIndex][strandIndex] || "";
                    const chars = strand.split("");
                    chars[baseIndex] = nextBase;
                    state.genome[helixIndex][strandIndex] = chars.join("");
                }

                function cycleGeneAt(helixIndex, geneIndex) {
                    const [strand1, strand2] = state.genome[helixIndex];
                    if (strand1[geneIndex]) {
                        setBase(
                            helixIndex,
                            0,
                            geneIndex,
                            cycleBase(strand1[geneIndex]),
                        );
                    }
                    if (strand2[geneIndex]) {
                        setBase(
                            helixIndex,
                            1,
                            geneIndex,
                            cycleBase(strand2[geneIndex]),
                        );
                    }
                    render();
                    maybeAutoCopy();
                }

                function cycleStrandBase(helixIndex, strandIndex, baseIndex) {
                    const strand = state.genome[helixIndex][strandIndex] || "";
                    if (!strand[baseIndex]) return;
                    setBase(
                        helixIndex,
                        strandIndex,
                        baseIndex,
                        cycleBase(strand[baseIndex]),
                    );
                    render();
                    maybeAutoCopy();
                }

                function buildStrandPreviewRow(
                    label,
                    strand,
                    helixIndex,
                    strandIndex,
                ) {
                    const row = createElement("div", { class: "strand-row" });
                    row.appendChild(
                        createElement("span", {
                            class: "strand-label",
                            text: label,
                        }),
                    );

                    strand.split("").forEach((base, baseIndex) => {
                        row.appendChild(
                            createEditableBase(
                                base,
                                () =>
                                    cycleStrandBase(
                                        helixIndex,
                                        strandIndex,
                                        baseIndex,
                                    ),
                                `Helix ${helixIndex} strand ${strandIndex + 1} position ${baseIndex}. Click to cycle base.`,
                            ),
                        );
                    });

                    return row;
                }

                function renderEditor() {
                    editorBody.innerHTML = "";
                    const editorGrid = createElement("div", {

                    state.genome.forEach(([strand1, strand2], helixIndex) => {

                        editorGrid.appendChild(helixCard);

                    editorBody.appendChild(editorGrid);

                function renderResults() {
                    resultsRoot.innerHTML = "";

                    HELIX_MAP.forEach((genes, helixIndex) => {
                        const [strand1, strand2] = state.genome[helixIndex] || [
                            "",
                            "",
                        ];
                        const hasData = Boolean(strand1 || strand2);

                        const helixBlock = createElement("div", {
                            class: "result-helix",
                        });
                        const header = createElement("div", {
                            class: "result-header",
                            style: `margin-bottom:${hasData ? "8px" : "0"}`,
                        });

                        header.appendChild(
                            createElement("span", {
                                text: `HELIX ${helixIndex}`,
                                style: "color:var(--accent);font-weight:bold;font-size:13px;min-width:65px",
                            }),
                        );

                        if (strand1) {
                            header.appendChild(
                                buildStrandPreviewRow(
                                    "S1",
                                    strand1,
                                    helixIndex,
                                    0,
                                ),
                            );
                        }

                        if (strand2 && strand2 !== strand1) {
                            header.appendChild(
                                buildStrandPreviewRow(
                                    "S2",
                                    strand2,
                                    helixIndex,
                                    1,
                                ),
                            );
                        } else if (strand2 && strand2 === strand1) {
                            header.appendChild(
                                createElement("span", {
                                    class: "dim",
                                    text: "S2 = S1",
                                    style: "font-size:10px",
                                }),
                            );
                        }

                        if (!hasData) {
                            header.appendChild(
                                createElement("span", {
                                    class: "dim",
                                    text: "no data",
                                    style: "font-size:11px",
                                }),
                            );
                        }

                        helixBlock.appendChild(header);

                        if (hasData) {
                            const geneList = createElement("div", {
                                class: "result-genes",
                            });

                            genes.forEach((geneName, geneIndex) => {
                                const gene = GENES[geneName];
                                const categoryColor = gene
                                    ? CAT_COLOR[gene.cat] || "#64748b"
                                    : "#475569";
                                const base1 =
                                    strand1?.[geneIndex]?.toUpperCase();
                                const base2 =
                                    strand2?.[geneIndex]?.toUpperCase();
                                const value1 = getGeneValue(gene, base1);
                                const value2 = getGeneValue(gene, base2);
                                const hasDescription = Boolean(gene?.desc);

                                const card = createElement("button", {
                                    type: "button",
                                    class: `result-gene${hasDescription ? " has-desc" : ""}`,
                                    style: `border-color:${categoryColor}33`,
                                    title: hasDescription
                                        ? `${gene.desc} Click to cycle both strands for this gene.`
                                        : "Click to cycle both strands for this gene.",
                                    "aria-label": `Gene ${geneName} on helix ${helixIndex} position ${geneIndex}. Click to cycle associated bases.`,
                                });

                                card.addEventListener("click", () =>
                                    cycleGeneAt(helixIndex, geneIndex),
                                );

                                card.appendChild(
                                    createElement("div", {
                                        class: "rpos",
                                        text: `H${helixIndex} · P${geneIndex}`,
                                    }),
                                );
                                card.appendChild(
                                    createElement("div", {
                                        class: "rname",
                                        text: geneName,
                                        style: `color:${categoryColor}`,
                                    }),
                                );

                                const valueRow = createElement("div", {
                                    class: "rval",
                                });
                                if (base1) {
                                    valueRow.insertAdjacentHTML(
                                        "beforeend",
                                        `${baseChip(base1)}<span class="muted">=</span><span style="color:${valueColor(value1)};font-weight:bold">${value1}</span>`,
                                    );
                                } else {
                                    valueRow.appendChild(
                                        createElement("span", {
                                            class: "dim",
                                            text: "—",
                                        }),
                                    );
                                }

                                if (base2 && base2 !== base1) {
                                    valueRow.insertAdjacentHTML(
                                        "beforeend",
                                        `<span class="dim" style="font-size:9px;margin-left:3px">S2:</span>${baseChip(base2)}<span class="muted">=</span><span style="color:${valueColor(value2)};font-weight:bold">${value2}</span>`,
                                    );
                                }

                                card.appendChild(valueRow);

                                if (hasDescription) {
                                    card.appendChild(
                                        createElement("div", {
                                            class: "gene-tooltip",
                                            text: gene.desc,
                                        }),
                                    );
                                }

                                geneList.appendChild(card);
                            });

                            helixBlock.appendChild(geneList);
                        }

                        resultsRoot.appendChild(helixBlock);
                    });
                }

                function render() {
                    syncTextAreaFromState();
                    updateEditorCollapseUI();
                    renderEditor();
                    renderResults();
                }

                analyzeButton.addEventListener("click", () => {
                    state.genome = parseGenome(genomeInput.value);
                    render();

                loadBlankButton.addEventListener("click", () => {
                    state.genome = makeUniformGenome("A");

                copyButton.addEventListener("click", async () => {
                    await copyGenomeToClipboard({ temporaryLabel: true });
                });

                autoCopyCheckbox.addEventListener("change", () => {
                    state.autoCopy = autoCopyCheckbox.checked;
                });

                clearButton.addEventListener("click", () => {
                    state.genome = EMPTY_GENOME();
                    genomeInput.value = "";
                    render();
                });

                editorToggle.addEventListener("click", () => {
                    state.editorCollapsed = !state.editorCollapsed;
                    updateEditorCollapseUI();
                });

                render();
            }

            createApp(document.getElementById("editor"));
        </script>
    </body>
</html>
