<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>C.R.I.S.P.R</title>
        <style>
            :root {
                --bg: #1b1f27;
                --bg-elevated: #222834;
                --bg-gradient-top: #151922;
                --surface: #222834;
                --surface-alt: #293140;
                --surface-soft: #313a4b;
                --surface-deep: #1c222c;
                --surface-overlay: #161c25;

                --border: #394355;
                --border-strong: #4a566c;
                --border-soft: rgba(148, 163, 184, 0.12);

                --accent: #7dd3fc;
                --accent-strong: #38bdf8;
                --accent-soft: rgba(56, 189, 248, 0.16);
                --accent-ring: rgba(125, 211, 252, 0.18);
                --accent-ring-strong: rgba(125, 211, 252, 0.62);
                --accent-hover: #bae6fd;

                --text: #f3f7fb;
                --text-soft: #d6deea;
                --muted: #9aa8bb;
                --dim: #748297;
                --inverse-text: #181b22;

                --shadow: rgba(0, 0, 0, 0.3);
                --shadow-soft: rgba(0, 0, 0, 0.18);
                --shadow-strong: rgba(0, 0, 0, 0.38);

                --green-hi: #86efac;
                --red-lo: #fca5a5;
                --warn: #fbbf24;
                --warn-soft: #fde68a;

                --A: #facc15;
                --T: #fb7185;
                --C: #60a5fa;
                --G: #4ade80;

                --button-primary-top: #215a75;
                --button-primary-bottom: #183f53;
                --button-primary-border: #46c5fb;

                --header-top: #344051;
                --header-bottom: #2a3443;

                --input-bg: #171d26;
                --chip-label: #c8d3df;

                --scrollbar-track: #161b22;
                --scrollbar-thumb: #556276;

                --gene-card-bg: #202733;
                --tooltip-bg: #161d26;

                --radius-sm: 8px;
                --radius-md: 12px;
                --radius-lg: 16px;
                --radius-xl: 18px;

                --cat-body: #fb923c;
                --cat-legs: #a78bfa;
                --cat-arms: #fb7185;
                --cat-neck: #34d399;
                --cat-tail: #f59e0b;
                --cat-feet: #38bdf8;
                --cat-head: #e879f9;
                --cat-face: #818cf8;
                --cat-mouth: #fdba74;
                --cat-antlers: #86efac;
                --cat-hat: #fbbf24;
                --cat-color: #6ee7b7;
                --cat-pattern: #67e8f9;
                --cat-locomotion: #f472b6;
                --cat-behavior: #94a3b8;
                --cat-signals: #c084fc;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background:
                    radial-gradient(
                        circle at top,
                        rgba(56, 189, 248, 0.08),
                        transparent 30%
                    ),
                    linear-gradient(
                        180deg,
                        var(--bg-gradient-top) 0%,
                        var(--bg) 100%
                    );
                color: var(--text);
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                font-size: 14px;
                line-height: 1.5;
                min-height: 100vh;
                padding: 24px 18px;
            }

            #app {
                max-width: 1200px;
                margin: 0 auto;
            }

            .card {
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.015),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--surface);
                border: 1px solid var(--border-soft);
                border-radius: var(--radius-xl);
                padding: 18px;
                margin-bottom: 16px;
                box-shadow:
                    0 20px 44px var(--shadow),
                    inset 0 1px 0 rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(10px);
            }

            .card-with-header {
                padding: 0;
                overflow: visible;
            }

            .card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 18px;
                padding: 18px 22px;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.03),
                        rgba(255, 255, 255, 0)
                    ),
                    linear-gradient(
                        180deg,
                        var(--header-top) 0%,
                        var(--header-bottom) 100%
                    );
                border-bottom: 1px solid var(--border-strong);
                border-top-left-radius: var(--radius-xl);
                border-top-right-radius: var(--radius-xl);
                box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.02);
            }

            .card-header-title {
                color: var(--text);
                font-size: 22px;
                letter-spacing: 0.02em;
                font-weight: 800;
                line-height: 1.2;
            }

            .card-header-meta {
                margin-left: auto;
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
                font-size: 13px;
                color: var(--text-soft);
            }

            .card-header-meta span b {
                font-size: 13px;
            }

            .card-content {
                padding: 20px;
            }

            .field {
                margin-bottom: 12px;
            }

            .field label {
                display: block;
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 700;
                margin-bottom: 8px;
            }

            .info {
                color: var(--muted);
                font-size: 13px;
                line-height: 1.65;
            }

            .button-row {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 14px;
                align-items: center;
            }

            .toggle-option {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-left: 4px;
                padding: 9px 12px;
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                background: var(--input-bg);
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 600;
                box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            }

            .toggle-option input {
                width: auto;
                margin: 0;
                accent-color: var(--accent-strong);
            }

            .editor-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 12px;
            }

            .helix-editor {
                margin-bottom: 0;
                padding: 14px;
                background: var(--surface-alt);
                border-color: var(--border);
                box-shadow: none;
            }

            .editor-title,
            .result-title {
                color: var(--accent);
                font-weight: 700;
                font-size: 16px;
            }

            .helix-name {
                color: var(--accent);
                font-weight: 700;
                margin-bottom: 4px;
                font-size: 14px;
                letter-spacing: 0.02em;
            }

            .helix-desc {
                color: var(--muted);
                font-size: 12px;
                margin-bottom: 12px;
            }

            .collapsible-toggle {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                background: transparent;
                border: 0;
                color: inherit;
                cursor: pointer;
                padding: 0;
                margin-bottom: 12px;
                text-align: left;
                font: inherit;
            }

            .collapsible-toggle:hover .editor-title {
                color: var(--accent-hover);
            }

            .collapse-indicator {
                color: var(--muted);
                font-size: 12px;
                font-weight: 600;
            }

            .is-collapsed {
                display: none;
            }

            input,
            textarea {
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                color: var(--text);
                font-family: inherit;
                font-size: 13px;
                padding: 11px 13px;
                width: 100%;
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.02),
                    0 1px 2px rgba(0, 0, 0, 0.14);
                transition:
                    border-color 0.14s ease,
                    box-shadow 0.14s ease,
                    background 0.14s ease;
            }

            input::placeholder,
            textarea::placeholder {
                color: var(--dim);
            }

            input:focus,
            textarea:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow:
                    0 0 0 3px var(--accent-ring),
                    inset 0 1px 0 rgba(255, 255, 255, 0.02);
            }

            textarea {
                resize: vertical;
                line-height: 1.55;
                min-height: 170px;
            }

            button.btn {
                padding: 9px 16px;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.03),
                        rgba(255, 255, 255, 0)
                    ),
                    linear-gradient(
                        180deg,
                        var(--button-primary-top) 0%,
                        var(--button-primary-bottom) 100%
                    );
                border: 1px solid var(--button-primary-border);
                border-radius: var(--radius-md);
                color: var(--text);
                cursor: pointer;
                font-family: inherit;
                font-size: 13px;
                font-weight: 700;
                transition:
                    transform 0.08s ease,
                    filter 0.12s ease,
                    box-shadow 0.12s ease,
                    border-color 0.12s ease;
                box-shadow:
                    0 10px 22px rgba(29, 78, 104, 0.24),
                    inset 0 1px 0 rgba(255, 255, 255, 0.08);
            }

            button.btn:hover {
                filter: brightness(1.06);
                transform: translateY(-1px);
                box-shadow:
                    0 14px 26px rgba(29, 78, 104, 0.32),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }

            button.btn-ghost {
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.02),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--surface-deep);
                border-color: var(--border);
                color: var(--text-soft);
                box-shadow:
                    0 6px 16px rgba(0, 0, 0, 0.16),
                    inset 0 1px 0 rgba(255, 255, 255, 0.03);
            }

            button.btn-mini {
                padding: 5px 8px;
                font-size: 11px;
                border-radius: var(--radius-sm);
                background: transparent;
                border: 1px solid var(--warn);
                color: var(--warn-soft);
                box-shadow: none;
            }

            button.btn-mini:hover {
                filter: brightness(1.08);
                transform: translateY(-1px);
            }

            .base {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                font-weight: 800;
                line-height: 1;
                flex-shrink: 0;
                user-select: none;
            }

            .base-A {
                background: var(--A);
                color: var(--inverse-text);
            }

            .base-T {
                background: var(--T);
                color: var(--inverse-text);
            }

            .base-C {
                background: var(--C);
                color: #ffffff;
            }

            .base-G {
                background: var(--G);
                color: var(--inverse-text);
            }

            .base-sm {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }

            .editable-base {
                cursor: pointer;
                box-shadow: inset 0 0 0 1px transparent;
                transition:
                    transform 0.08s ease,
                    box-shadow 0.08s ease;
            }

            .editable-base:hover,
            .editable-base:focus-visible {
                transform: translateY(-1px);
                box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.35),
                    0 0 0 2px var(--accent-ring-strong);
                outline: none;
            }

            .result-helix {
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.015),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--surface);
                border: 1px solid var(--border-soft);
                border-radius: var(--radius-lg);
                margin-bottom: 12px;
                box-shadow:
                    0 14px 30px var(--shadow-soft),
                    inset 0 1px 0 rgba(255, 255, 255, 0.02);
                overflow: visible;
            }

            .result-header {
                display: flex;
                align-items: stretch;
                justify-content: space-between;
                gap: 14px;
                padding: 13px 15px;
                margin-bottom: 0;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.025),
                        rgba(255, 255, 255, 0)
                    ),
                    linear-gradient(
                        180deg,
                        var(--header-top) 0%,
                        var(--header-bottom) 100%
                    );
                border-bottom: 1px solid var(--border-strong);
                border-top-left-radius: var(--radius-lg);
                border-top-right-radius: var(--radius-lg);
            }

            .result-header:only-child {
                border-bottom-left-radius: var(--radius-lg);
                border-bottom-right-radius: var(--radius-lg);
                border-bottom: none;
            }

            .result-heading {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                justify-content: center;
                gap: 3px;
                min-width: 0;
                flex: 1 1 auto;
            }

            .helix-title {
                color: var(--text);
                font-weight: 800;
                font-size: 14px;
                letter-spacing: 0.01em;
                line-height: 1.25;
            }

            .helix-subtitle {
                color: var(--text-soft);
                font-size: 12px;
                font-weight: 600;
                opacity: 0.92;
            }

            .result-body {
                padding: 14px 16px 16px;
                border-bottom-left-radius: var(--radius-lg);
                border-bottom-right-radius: var(--radius-lg);
            }

            .strand-stack {
                display: flex;
                flex-direction: column;
                gap: 6px;
                align-items: flex-end;
                justify-content: center;
                flex: 0 0 auto;
                max-width: 58%;
            }

            .strand-row {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 6px;
                flex-wrap: nowrap;
                min-height: 22px;
            }

            .strand-label {
                color: var(--chip-label);
                font-size: 10px;
                font-weight: 800;
                width: 24px;
                flex: 0 0 24px;
                text-align: right;
                letter-spacing: 0.06em;
            }

            .result-genes {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 0;
                align-items: stretch;
            }

            .result-gene {
                position: relative;
                z-index: 0;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.018),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--gene-card-bg);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                padding: 10px;
                min-width: 154px;
                cursor: pointer;
                text-align: left;
                color: inherit;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: flex-start;
                vertical-align: top;
                transition:
                    border-color 0.12s ease,
                    transform 0.08s ease,
                    box-shadow 0.12s ease;
            }

            .result-gene:hover,
            .result-gene:focus-visible {
                z-index: 20;
                border-color: var(--accent) !important;
                outline: none;
                transform: translateY(-1px);
                box-shadow:
                    0 0 0 3px var(--accent-soft),
                    0 10px 20px rgba(0, 0, 0, 0.18);
            }

            .result-gene .rpos {
                color: var(--dim);
                font-size: 10px;
                font-weight: 600;
                margin-top: 3px;
            }

            .result-gene .rname {
                font-size: 12px;
                font-weight: 800;
                margin: 0 0 2px;
                letter-spacing: 0.02em;
                line-height: 1.3;
            }

            .result-gene .rval {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                font-size: 11px;
                margin-top: 8px;
            }

            .allele-line {
                display: flex;
                align-items: center;
                gap: 4px;
                flex-wrap: wrap;
            }

            .gene-mixed-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin-top: 8px;
                width: 100%;
            }

            .gene-warning {
                color: var(--warn-soft);
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.03em;
            }

            .gene-tooltip {
                position: absolute;
                left: 0;
                top: calc(100% + 8px);
                z-index: 21;
                width: min(320px, 65vw);
                padding: 10px 12px;
                background: var(--tooltip-bg);
                color: var(--text);
                border: 1px solid var(--accent);
                border-radius: var(--radius-md);
                box-shadow: 0 16px 32px var(--shadow-strong);
                font-size: 12px;
                line-height: 1.6;
                display: none;
                white-space: normal;
                pointer-events: none;
            }

            .gene-tooltip::before {
                content: "";
                position: absolute;
                top: -5px;
                left: 16px;
                width: 8px;
                height: 8px;
                background: var(--tooltip-bg);
                border-left: 1px solid var(--accent);
                border-top: 1px solid var(--accent);
                transform: rotate(45deg);
            }

            .tooltip-code {
                display: block;
                color: var(--accent);
                font-weight: 800;
                font-size: 11px;
                margin-bottom: 6px;
                letter-spacing: 0.04em;
            }

            .result-gene:hover .gene-tooltip,
            .result-gene:focus-visible .gene-tooltip {
                display: block;
            }

            .muted {
                color: var(--muted);
            }

            .dim {
                color: var(--dim);
            }

            @media (max-width: 720px) {
                .card-header {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .card-header-meta {
                    margin-left: 0;
                }

                .result-header {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .strand-stack {
                    align-items: flex-start;
                    max-width: 100%;
                    width: 100%;
                }

                .strand-row {
                    flex-wrap: wrap;
                    justify-content: flex-start;
                }

                .strand-label {
                    width: auto;
                    flex-basis: 100%;
                    text-align: left;
                }
            }

            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: var(--scrollbar-track);
            }

            ::-webkit-scrollbar-thumb {
                background: var(--scrollbar-thumb);
                border-radius: 999px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div id="editor"></div>
        </div>

        <script>
            "use strict";

            const HELIX_COUNT = 20;
            const VALID_BASE_RE = /[^ATCG]/g;
            const BASES = ["A", "T", "C", "G"];
            const BASE_INDEX = Object.freeze({ A: 0, T: 1, C: 2, G: 3 });

            const HELIX_DESCRIPTIONS = Object.freeze([
                "Body Structure",
                "Gut, Behavior, Pattern",
                "Flexibility & Muscle",
                "Joints & Angles",
                "Limb Tags & Counts",
                "Locomotion Type & Upper Arms",
                "Body Size & Neck Shape",
                "Tail",
                "Leg & Arm Dimensions",
                "Feet & Hands",
                "Head Shape",
                "Eyes & Ears",
                "Mouth & Nose",
                "Antlers & Hat Pom",
                "Antler Detail",
                "Hat",
                "Color",
                "Pattern & Coat",
                "Speed & Locomotion Control",
                "Locomotion Signals",
            ]);

            const makeUniformGenome = (base = "A") =>
                Array.from({ length: HELIX_COUNT }, (_, helixIndex) => {
                    const geneCount = HELIX_MAP[helixIndex]?.length ?? 0;
                    const strand = base.repeat(geneCount);
                    return [strand, strand];
                });

            const EMPTY_GENOME = () => makeUniformGenome("");

            const CAT_COLOR = Object.freeze({
                Body: "#f97316",
                Legs: "#a78bfa",
                Arms: "#fb7185",
                Neck: "#34d399",
                Tail: "#f59e0b",
                Feet: "#38bdf8",
                Head: "#e879f9",
                Face: "#818cf8",
                Mouth: "#fb923c",
                Antlers: "#86efac",
                Hat: "#fbbf24",
                Color: "#6ee7b7",
                Pattern: "#67e8f9",
                Locomotion: "#f472b6",
                Behavior: "#94a3b8",
                Signals: "#c084fc",
            });

            const GENE_DESCRIPTIONS = {
                NARCOLEPSY:
                    "Horse randomly falls asleep when idle if nonzero. Internally switches idle behaviour to sleep when active. Values: A/T/C = 0 (safe), G = 1 (narcoleptic). Avoid G for racing builds.",
                RAMPAGE:
                    "Controls aggression threshold at rest. Also used as a runtime state: when lassoed, the game writes 1 to this field, forcing rampage mode. During rampage, locomotion signals are overridden and the horse fights, bolts, and flees.",
                HIGH_INTELLECT:
                    "Enables progression to genius behaviour. Required for philosophical/refusal states. This gene is a gate: without it active, the horse cannot reach genius state regardless of other factors.",
                BRAIN_SPASTIC:
                    "Applies random positional jitter each tick, causing twitching and erratic movement. Values: A = strong spasms, G = mild spasms, T/C = none. When active, it also clears OLD_AGE runtime effects, so it can partially suppress visible age-related degradation.",
                WHITE_IS_LETHAL:
                    "If active and WHITE coat is expressed in a foal, a lethal check is applied at birth and the foal may die. Mirrors lethal white behaviour. Most relevant when WHITE is also active.",
                FLU_IMMUNITY:
                    "Grants immunity to the flu mechanic. Values: A/T/C = susceptible, G = immune. This gene also appears to be tied to the sickness/immunity mechanic sometimes referred to as 'Sweetie'.",
                LIMP: "Affects gait asymmetry. C produces a strong limp, G a slight limp, A/T are normal. Likely worsens with age.",
                LEG_AND_ARM_LIMP:
                    "Applies limp to all limbs simultaneously instead of just an asymmetric gait. Full-body limp flag. Related to LIMP, but broader in scope.",
                OMNIVORE:
                    "Enables carnivorous behaviour. When active, the horse may chase and eat NPCs or other horses instead of grazing normally. This gene appears to be part of the feeding/diet behaviour system rather than being purely cosmetic.",
                LITTER_SIZE:
                    "Directly controls number of offspring per birth. Values: A = 3, T = 2, C = 1, G = 5. G appears to be the high-litter allele.",
                SPINAL_LOCO:
                    "Controls locomotion mode: 0 = legs only, 1 = mild spinal undulation, 2 = full serpentine/worm-like movement. A gives the maximum serpentine mode and is unstable; C/G are safest for normal racing movement.",
                LOCO_SYNC:
                    "Global locomotion synchronisation flag. T enables coordinated limb timing; A/C/G leave limbs free-running, which can produce chaotic motion. Works alongside the locomotion signal genes.",
                L_LEG_SIGNAL:
                    "Broadcast signal ID emitted by the legs when they complete a movement phase. Other limbs react when their listener values match this signal. Part of the locomotion signalling network with L_ARM_SIGNAL, L_TAIL_SIGNAL, L_NECK_SIGNAL, and the *_REACT / *_EVENT genes.",
                L_ARM_SIGNAL:
                    "Broadcast signal ID emitted by the arms/front limbs when they complete a movement phase. Helps coordinate front limb timing. Part of the locomotion signalling network shared with the other L_* signal genes.",
                L_TAIL_SIGNAL:
                    "Tail synchronisation signal. Controls when the tail moves relative to the gait cycle. Part of the same signalling system as the leg, arm, and neck signal genes.",
                L_NECK_SIGNAL:

                    L_NECK_SIGNAL: "Neck Signal",
                    L_LEG_FTOB_REACT: "Leg Forward-To-Back React",

                    L_LEG_BTOF_REACT: "Leg Back-To-Forward React",

                    L_ARM_FTOB_REACT: "Arm Forward-To-Back React",
                    L_ARM_FTOB_EVENT: "Arm Forward-To-Back Event",
                    L_ARM_BTOF_REACT: "Arm Back-To-Forward React",
                    L_ARM_BTOF_EVENT: "Arm Back-To-Forward Event",
                    L_TAIL_FTOB_REACT: "Tail Forward-To-Back React",
                    L_TAIL_FTOB_EVENT: "Tail Forward-To-Back Event",
                    L_TAIL_BTOF_REACT: "Tail Back-To-Forward React",

                    L_NECK_BTOF_EVENT: "Neck Back-To-Forward Event",

                const parts = rawName.split("_");

                // Step 2: split letters/numbers (e.g. STRETCH2 -> ["STRETCH", "2"])
                const splitParts = parts.flatMap(
                    (part) => part.match(/[A-Z]+|\d+/g) || [],
                );

                // Step 3: title-case words, leave numbers as-is
                return splitParts
                    .map((part) =>
                        /^\d+$/.test(part)
                            ? part
                            : part.charAt(0) + part.slice(1).toLowerCase(),
                    )
                    .join(" ");
            }

                Object.fromEntries(
                    Object.keys(GENES).map((name) => [
                        name,
                        createHumanGeneName(name),

            );

            for (const [name, description] of Object.entries(
                GENE_DESCRIPTIONS,
            )) {
                if (GENES[name]) {
                    GENES[name].desc = description;

            function createElement(tag, attrs = {}, children = []) {
                const element = document.createElement(tag);

                for (const [key, value] of Object.entries(attrs)) {
                    if (value == null) continue;
                    if (key === "class") element.className = value;
                    else if (key === "text") element.textContent = value;
                    else if (key === "html") element.innerHTML = value;
                    else if (key === "value") element.value = value;
                    else if (key === "checked")
                        element.checked = Boolean(value);
                    else if (key === "style") element.style.cssText = value;
                    else if (
                        key.startsWith("on") &&
                        typeof value === "function"
                    )
                        element.addEventListener(key.slice(2), value);
                    else element.setAttribute(key, value);
                }

                for (const child of Array.isArray(children)
                    ? children
                    : [children]) {
                    if (child == null) continue;
                    if (typeof child === "string")
                        element.insertAdjacentHTML("beforeend", child);
                    else element.appendChild(child);
                }

                return element;
            }

            function sanitizeSequence(value) {
                return String(value || "")
                    .toUpperCase()
                    .replace(VALID_BASE_RE, "");
            }

            function normalizeGenome(genome) {
                return genome.map(([strand1 = "", strand2 = ""]) => [
                    sanitizeSequence(strand1),
                    sanitizeSequence(strand2),
                ]);
            }

            function cycleBase(base) {
                const currentIndex = BASES.indexOf(base);
                return BASES[(currentIndex + 1 + BASES.length) % BASES.length];
            }

            function baseChip(base, size = "sm") {
                if (!BASES.includes(base)) {
                    return '<span class="muted">?</span>';
                }
                return `<span class="base base-${base} base-${size}">${base}</span>`;
            }

                if (value == null) return "var(--muted)";
                if (value > 0) return "var(--green-hi)";
                if (value < 0) return "var(--red-lo)";
                return "var(--muted)";
            }

            function getGeneValue(gene, base) {
                if (
                    !gene ||
                    !Object.prototype.hasOwnProperty.call(BASE_INDEX, base)
                )
                    return null;
                return gene.g[BASE_INDEX[base]];
            }

            function getHelixDisplayName(helixIndex) {
                return `Helix ${helixIndex}`;
            }

            function getHelixDescription(helixIndex) {
                return HELIX_DESCRIPTIONS[helixIndex] || "Unknown";
            }

            function getHelixIndexFactory() {
                const labelToIndex = new Map();
                let nextDynamicIndex = 0;

                return function getHelixIndex(rawLabel) {
                    const label = String(rawLabel).toUpperCase();

                    if (/^\d{1,2}$/.test(label)) {
                        const index = Number.parseInt(label, 10);
                        return index >= 0 && index < HELIX_COUNT ? index : -1;
                    }

                    if (!labelToIndex.has(label)) {
                        if (nextDynamicIndex >= HELIX_COUNT) return -1;
                        labelToIndex.set(label, nextDynamicIndex++);
                    }

                    return labelToIndex.get(label);
                };
            }

            function parseGenome(text) {
                const genome = EMPTY_GENOME();
                const lines = String(text || "")
                    .trim()
                    .split("\n")
                    .map((line) => line.trim())
                    .filter(Boolean);

                const getHelixIndex = getHelixIndexFactory();
                let currentHelix = -1;

                const patterns = {
                    newFormat: /^([A-Za-z0-9]+)\s*:\s*([atcg]+)$/i,
                    numbered: /^(\d{1,2})\s*:\s*([atcg]+)$/i,
                    verboseBoth:
                        /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)\s*:\s*(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                    verboseFirst:
                        /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)$/i,
                    verboseSecond:
                        /^(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                    bareStrand: /^[atcg]+$/i,
                };

                function assignStrand(index, sequence) {
                    if (index < 0 || index >= HELIX_COUNT) return;
                    if (!genome[index][0]) genome[index][0] = sequence;
                    else genome[index][1] = sequence;
                }

                for (const line of lines) {
                    let match = line.match(patterns.newFormat);
                    if (match) {
                        assignStrand(
                            getHelixIndex(match[1]),
                            match[2].toUpperCase(),
                        );
                        continue;
                    }

                    match = line.match(patterns.numbered);
                    if (match) {
                        assignStrand(
                            Number.parseInt(match[1], 10),
                            match[2].toUpperCase(),
                        );
                        continue;
                    }

                    match = line.match(patterns.verboseBoth);
                    if (match) {
                        currentHelix = getHelixIndex(match[1]);
                        if (currentHelix >= 0) {
                            genome[currentHelix][0] = match[2].toUpperCase();
                            genome[currentHelix][1] = match[3].toUpperCase();
                        }
                        continue;
                    }

                    match = line.match(patterns.verboseFirst);
                    if (match) {
                        currentHelix = getHelixIndex(match[1]);
                        if (currentHelix >= 0) {
                            genome[currentHelix][0] = match[2].toUpperCase();
                        }
                        continue;
                    }

                    match = line.match(patterns.verboseSecond);
                    if (match && currentHelix >= 0) {
                        genome[currentHelix][1] = match[1].toUpperCase();
                        continue;
                    }

                    if (
                        currentHelix >= 0 &&
                        !genome[currentHelix][1] &&
                        patterns.bareStrand.test(line)
                    ) {
                        genome[currentHelix][1] = line.toUpperCase();
                    }
                }

                return normalizeGenome(genome);
            }

            function formatGenomeForExport(genome) {
                const lines = [];
                genome.forEach(([strand1, strand2], helixIndex) => {
                    const label = String(helixIndex).padStart(2, "0");
                    if (strand1) lines.push(`${label}:${strand1}`);
                    if (strand2) lines.push(`${label}:${strand2}`);
                });
                return lines.join("\n");
            }

            function createEditableBase(base, onActivate, label) {

                    text: base,

                button.addEventListener("click", (event) => {
                    event.stopPropagation();
                    onActivate();
                });
                return button;
            }

                root.innerHTML = "";

                root.appendChild(resultsRoot);

                function syncTextAreaFromState() {
                    genomeInput.value = formatGenomeForExport(state.genome);
                }

                function setCopyButtonLabel(label) {
                    copyButton.textContent = label;
                }

                async function copyGenomeToClipboard({
                    temporaryLabel = true,
                } = {}) {
                    syncTextAreaFromState();

                    try {
                        await navigator.clipboard.writeText(genomeInput.value);
                        if (temporaryLabel) {
                            setCopyButtonLabel("Copied");
                            window.setTimeout(() => {
                                setCopyButtonLabel("Copy Genome");
                            }, 1200);
                        }
                        return true;
                    } catch {
                        if (temporaryLabel) {
                            genomeInput.focus();
                            genomeInput.select();
                            setCopyButtonLabel("Select & Copy");
                            window.setTimeout(() => {
                                setCopyButtonLabel("Copy Genome");
                            }, 1200);
                        }
                        return false;
                    }
                }

                function maybeAutoCopy() {
                    if (!state.autoCopy) return;
                    void copyGenomeToClipboard({ temporaryLabel: true });
                }

                function setBase(helixIndex, strandIndex, baseIndex, nextBase) {
                    const strand = state.genome[helixIndex][strandIndex] || "";
                    const chars = strand.split("");
                    chars[baseIndex] = nextBase;
                    state.genome[helixIndex][strandIndex] = chars.join("");
                }

                function cycleGeneAt(helixIndex, geneIndex) {
                    const [strand1, strand2] = state.genome[helixIndex];
                    const base1 = strand1?.[geneIndex];
                    const base2 = strand2?.[geneIndex];

                    if (!base1 && !base2) return;

                    if (base1 && base2 && base1 === base2) {
                        const nextBase = cycleBase(base1);
                        setBase(helixIndex, 0, geneIndex, nextBase);
                        setBase(helixIndex, 1, geneIndex, nextBase);
                    } else if (base1 && !base2) {
                        setBase(helixIndex, 0, geneIndex, cycleBase(base1));
                    } else if (!base1 && base2) {
                        setBase(helixIndex, 1, geneIndex, cycleBase(base2));
                    }

                    render();
                    maybeAutoCopy();
                }

                function mergeGeneAlleles(helixIndex, geneIndex, options = {}) {
                    const { silent = false } = options;
                    const [strand1, strand2] = state.genome[helixIndex];
                    const base1 = strand1?.[geneIndex];
                    const base2 = strand2?.[geneIndex];

                    if (!base1 && !base2) return;

                    const mergedBase = base1 || base2;
                    if (base1) setBase(helixIndex, 0, geneIndex, mergedBase);
                    if (base2) setBase(helixIndex, 1, geneIndex, mergedBase);

                    if (!silent) {
                        render();
                        maybeAutoCopy();
                    }
                }

                function hasMergeableAlleles() {
                    return HELIX_MAP.some((genes, helixIndex) => {
                        const [strand1 = "", strand2 = ""] = state.genome[
                            helixIndex
                        ] || ["", ""];

                        return genes.some((_, geneIndex) => {
                            const base1 = strand1[geneIndex];
                            const base2 = strand2[geneIndex];
                            return Boolean(base1 && base2 && base1 !== base2);
                        });
                    });
                }

                function mergeAllAlleles() {
                    HELIX_MAP.forEach((genes, helixIndex) => {
                        genes.forEach((_, geneIndex) => {
                            const [strand1 = "", strand2 = ""] = state.genome[
                                helixIndex
                            ] || ["", ""];
                            const base1 = strand1[geneIndex];
                            const base2 = strand2[geneIndex];

                            if (base1 && base2 && base1 !== base2) {
                                mergeGeneAlleles(helixIndex, geneIndex, {
                                    silent: true,
                                });
                            }
                        });
                    });
                }

                function cycleStrandBase(helixIndex, strandIndex, baseIndex) {
                    const strand = state.genome[helixIndex][strandIndex] || "";
                    if (!strand[baseIndex]) return;
                    setBase(
                        helixIndex,
                        strandIndex,
                        baseIndex,
                        cycleBase(strand[baseIndex]),
                    );
                    render();
                    maybeAutoCopy();
                }

                function buildStrandPreviewRow(
                    label,
                    strand,
                    helixIndex,
                    strandIndex,
                ) {
                    const row = createElement("div", { class: "strand-row" });
                    row.appendChild(
                        createElement("span", {
                            class: "strand-label",
                            text: label,
                        }),
                    );

                    strand.split("").forEach((base, baseIndex) => {
                        row.appendChild(
                            createEditableBase(
                                base,
                                () =>
                                    cycleStrandBase(
                                        helixIndex,
                                        strandIndex,
                                        baseIndex,
                                    ),
                                `${getHelixDisplayName(helixIndex)} strand ${strandIndex + 1} position ${baseIndex + 1}. Click to cycle base.`,
                            ),
                        );
                    });

                    return row;
                }

                function buildStrandStack(helixIndex, strand1, strand2) {
                    const stack = createElement("div", {
                        class: "strand-stack",
                    });

                    if (strand1) {
                        stack.appendChild(
                            buildStrandPreviewRow("S1", strand1, helixIndex, 0),
                        );
                    }

                    if (strand2) {
                        stack.appendChild(
                            buildStrandPreviewRow("S2", strand2, helixIndex, 1),
                        );
                    }

                    return stack;
                }

                function renderResults() {
                    resultsRoot.innerHTML = "";

                    HELIX_MAP.forEach((genes, helixIndex) => {
                        const [strand1, strand2] = state.genome[helixIndex] || [
                            "",
                            "",
                        ];
                        const hasData = Boolean(strand1 || strand2);

                        const helixBlock = createElement("div", {
                            class: "result-helix",
                        });

                        const header = createElement("div", {
                            class: "result-header",
                        });

                        const heading = createElement("div", {
                            class: "result-heading",
                        });

                        heading.appendChild(
                            createElement("div", {
                                class: "helix-title",
                                text: getHelixDisplayName(helixIndex),
                            }),
                        );

                        heading.appendChild(
                            createElement("div", {
                                class: "helix-subtitle",
                                text: getHelixDescription(helixIndex),
                            }),
                        );

                        header.appendChild(heading);

                        if (hasData) {
                            header.appendChild(
                                buildStrandStack(helixIndex, strand1, strand2),
                            );
                        } else {
                            header.appendChild(
                                createElement("span", {
                                    class: "dim",
                                    text: "no data",
                                    style: "font-size:11px;align-self:center;",
                                }),
                            );
                        }

                        helixBlock.appendChild(header);

                        if (hasData) {
                            const body = createElement("div", {
                                class: "result-body",
                            });

                            const geneList = createElement("div", {
                                class: "result-genes",
                            });

                            genes.forEach((geneName, geneIndex) => {
                                const gene = GENES[geneName];
                                const humanName =
                                    GENE_HUMAN_NAMES[geneName] || geneName;
                                const categoryColor = gene
                                    ? CAT_COLOR[gene.cat] || "#64748b"
                                    : "#475569";
                                const base1 =
                                    strand1?.[geneIndex]?.toUpperCase();
                                const base2 =
                                    strand2?.[geneIndex]?.toUpperCase();
                                const value1 = getGeneValue(gene, base1);
                                const value2 = getGeneValue(gene, base2);
                                const isMixed =
                                    Boolean(base1 && base2) && base1 !== base2;
                                const tooltipLines = [];

                                tooltipLines.push(
                                    createElement("span", {
                                        class: "tooltip-code",
                                        text: geneName,
                                    }),
                                );

                                if (gene?.desc) {
                                    tooltipLines.push(
                                        createElement("span", {
                                            text: gene.desc,
                                        }),
                                    );
                                }

                                const card = createElement("button", {
                                    type: "button",
                                    class: "result-gene",
                                    style: `border-color:${categoryColor}33`,
                                    title: geneName,
                                    "aria-label": `Gene ${geneName} on ${getHelixDisplayName(helixIndex)} position ${geneIndex + 1}.`,
                                });

                                if (!isMixed) {
                                    card.addEventListener("click", () =>
                                        cycleGeneAt(helixIndex, geneIndex),
                                    );
                                }

                                card.appendChild(
                                    createElement("div", {
                                        class: "rname",
                                        text: humanName,
                                        style: `color:${categoryColor}`,
                                    }),
                                );

                                card.appendChild(
                                    createElement("div", {
                                        class: "rpos",
                                        text: `${getHelixDisplayName(helixIndex)} · P${geneIndex}`,
                                    }),
                                );

                                const valueRow = createElement("div", {
                                    class: "rval",
                                });

                                if (base1) {
                                    valueRow.appendChild(
                                        createElement(
                                            "div",
                                            { class: "allele-line" },
                                            `${
                                                createElement("span", {
                                                    class: "dim",
                                                    text: isMixed
                                                        ? "S1:"
                                                        : "Allele:",
                                                }).outerHTML
                                            }${baseChip(base1)}<span class="muted">=</span><span style="color:${valueColor(value1)};font-weight:bold">${value1}</span>`,
                                        ),
                                    );
                                }

                                if (isMixed && base2) {
                                    valueRow.appendChild(
                                        createElement(
                                            "div",
                                            { class: "allele-line" },
                                            `${
                                                createElement("span", {
                                                    class: "dim",
                                                    text: "S2:",
                                                }).outerHTML
                                            }${baseChip(base2)}<span class="muted">=</span><span style="color:${valueColor(value2)};font-weight:bold">${value2}</span>`,
                                        ),
                                    );
                                }

                                if (!base1 && !base2) {
                                    valueRow.appendChild(
                                        createElement("span", {
                                            class: "dim",
                                            text: "—",
                                        }),
                                    );
                                }

                                card.appendChild(valueRow);

                                if (isMixed) {
                                    const mixedRow = createElement("div", {
                                        class: "gene-mixed-row",
                                    });

                                    mixedRow.appendChild(
                                        createElement("span", {
                                            class: "gene-warning",
                                            text: "MIXED ALLELES",
                                        }),
                                    );

                                    const mergeButton = createElement(
                                        "button",
                                        {
                                            type: "button",
                                            class: "btn-mini",
                                            text: "Merge",
                                        },
                                    );

                                    mergeButton.addEventListener(
                                        "click",
                                        (event) => {
                                            event.stopPropagation();
                                            mergeGeneAlleles(
                                                helixIndex,
                                                geneIndex,
                                            );
                                        },
                                    );

                                    mixedRow.appendChild(mergeButton);
                                    card.appendChild(mixedRow);
                                }

                                card.appendChild(
                                    createElement(
                                        "div",
                                        { class: "gene-tooltip" },
                                        tooltipLines,
                                    ),
                                );

                                geneList.appendChild(card);
                            });

                            body.appendChild(geneList);
                            helixBlock.appendChild(body);
                        }

                        resultsRoot.appendChild(helixBlock);
                    });
                }

                function render() {
                    syncTextAreaFromState();
                    mergeAllButton.style.display = hasMergeableAlleles()
                        ? ""
                        : "none";
                    renderResults();
                }

                function randomBase() {
                    return BASES[Math.floor(Math.random() * BASES.length)];
                }

                function randomGenome() {
                    return Array.from(
                        { length: HELIX_COUNT },
                        (_, helixIndex) => {
                            const geneCount =
                                HELIX_MAP[helixIndex]?.length ?? 0;
                            const strand1 = Array.from(
                                { length: geneCount },
                                randomBase,
                            ).join("");
                            const strand2 = Array.from(
                                { length: geneCount },
                                randomBase,
                            ).join("");
                            return [strand1, strand2];
                        },
                    );
                }

                analyzeButton.addEventListener("click", () => {
                    state.genome = parseGenome(genomeInput.value);
                    render();
                });

                loadBlankButton.addEventListener("click", () => {
                    state.genome = makeUniformGenome("A");
                    render();
                });

                randomizeButton.addEventListener("click", () => {
                    state.genome = randomGenome();
                    render();
                    maybeAutoCopy();
                });

                mergeAllButton.addEventListener("click", () => {
                    mergeAllAlleles();
                    render();
                    maybeAutoCopy();
                });

                copyButton.addEventListener("click", async () => {
                    await copyGenomeToClipboard({ temporaryLabel: true });
                });

                autoCopyCheckbox.addEventListener("change", () => {
                    state.autoCopy = autoCopyCheckbox.checked;
                });

                clearButton.addEventListener("click", () => {
                    state.genome = EMPTY_GENOME();
                    genomeInput.value = "";
                    render();
                });

                render();
            }

            createApp(document.getElementById("editor"));
        </script>
    </body>
</html>
