<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>C.R.I.S.P.R</title>
        <style>
            :root {
                --bg: #1b1f27;
                --bg-gradient-top: #151922;
                --surface: #222834;
                --surface-alt: #293140;
                --surface-deep: #1c222c;
                --border: #394355;
                --border-strong: #4a566c;
                --border-soft: rgba(148, 163, 184, 0.12);
                --accent: #7dd3fc;
                --accent-strong: #38bdf8;
                --accent-soft: rgba(56, 189, 248, 0.16);
                --accent-ring: rgba(125, 211, 252, 0.18);
                --accent-ring-strong: rgba(125, 211, 252, 0.62);
                --accent-hover: #bae6fd;
                --text: #f3f7fb;
                --text-soft: #d6deea;
                --muted: #9aa8bb;
                --dim: #748297;
                --inverse-text: #181b22;
                --shadow: rgba(0, 0, 0, 0.3);
                --shadow-soft: rgba(0, 0, 0, 0.18);
                --shadow-strong: rgba(0, 0, 0, 0.38);
                --green-hi: #86efac;
                --red-lo: #fca5a5;
                --warn: #fbbf24;
                --warn-soft: #fde68a;
                --A: #facc15;
                --T: #fb7185;
                --C: #60a5fa;
                --G: #4ade80;
                --button-primary-top: #215a75;
                --button-primary-bottom: #183f53;
                --button-primary-border: #46c5fb;
                --header-top: #344051;
                --header-bottom: #2a3443;
                --input-bg: #171d26;
                --chip-label: #c8d3df;
                --scrollbar-track: #161b22;
                --scrollbar-thumb: #556276;
                --gene-card-bg: #202733;
                --tooltip-bg: #161d26;
                --radius-sm: 8px;
                --radius-md: 12px;
                --radius-lg: 16px;
                --radius-xl: 18px;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background:
                    radial-gradient(
                        circle at top,
                        rgba(56, 189, 248, 0.08),
                        transparent 30%
                    ),
                    linear-gradient(180deg, var(--bg-gradient-top), var(--bg));
                color: var(--text);
                font-family:
                    Inter,
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                font-size: 14px;
                line-height: 1.5;
                min-height: 100vh;
                padding: 24px 18px;
            }
            #app {
                max-width: 1200px;
                margin: 0 auto;
            }
            .card {
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.015),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--surface);
                border: 1px solid var(--border-soft);
                border-radius: var(--radius-xl);
                padding: 18px;
                margin-bottom: 16px;
                box-shadow:
                    0 20px 44px var(--shadow),
                    inset 0 1px 0 rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(10px);
            }
            .card-with-header {
                padding: 0;
                overflow: visible;
            }
            .card-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 18px;
                padding: 18px 22px;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.03),
                        rgba(255, 255, 255, 0)
                    ),
                    linear-gradient(
                        180deg,
                        var(--header-top),
                        var(--header-bottom)
                    );
                border-bottom: 1px solid var(--border-strong);
                border-top-left-radius: var(--radius-xl);
                border-top-right-radius: var(--radius-xl);
            }
            .card-header-title {
                font-size: 22px;
                letter-spacing: 0.02em;
                font-weight: 800;
                line-height: 1.2;
            }
            .card-header-meta {
                margin-left: auto;
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
                font-size: 13px;
                color: var(--text-soft);
            }
            .card-content {
                padding: 20px;
            }
            .field {
                margin-bottom: 12px;
            }
            .field label {
                display: block;
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 700;
                margin-bottom: 8px;
            }
            .button-row {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 14px;
                align-items: center;
            }
            .toggle-option {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-left: 4px;
                padding: 9px 12px;
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                background: var(--input-bg);
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 600;
            }
            .toggle-option input {
                width: auto;
                margin: 0;
                accent-color: var(--accent-strong);
            }
            input,
            textarea {
                background: var(--input-bg);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                color: var(--text);
                font-family: inherit;
                font-size: 13px;
                padding: 11px 13px;
                width: 100%;
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.02),
                    0 1px 2px rgba(0, 0, 0, 0.14);
                transition:
                    border-color 0.14s ease,
                    box-shadow 0.14s ease,
                    background 0.14s ease;
            }
            input::placeholder,
            textarea::placeholder {
                color: var(--dim);
            }
            input:focus,
            textarea:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow:
                    0 0 0 3px var(--accent-ring),
                    inset 0 1px 0 rgba(255, 255, 255, 0.02);
            }
            textarea {
                resize: vertical;
                line-height: 1.55;
                min-height: 170px;
            }
            button.btn {
                padding: 9px 16px;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.03),
                        rgba(255, 255, 255, 0)
                    ),
                    linear-gradient(
                        180deg,
                        var(--button-primary-top),
                        var(--button-primary-bottom)
                    );
                border: 1px solid var(--button-primary-border);
                border-radius: var(--radius-md);
                color: var(--text);
                cursor: pointer;
                font-family: inherit;
                font-size: 13px;
                font-weight: 700;
                transition:
                    transform 0.08s ease,
                    filter 0.12s ease,
                    box-shadow 0.12s ease,
                    border-color 0.12s ease;
                box-shadow:
                    0 10px 22px rgba(29, 78, 104, 0.24),
                    inset 0 1px 0 rgba(255, 255, 255, 0.08);
            }
            button.btn:hover {
                filter: brightness(1.06);
                transform: translateY(-1px);
            }
            button.btn-ghost {
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.02),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--surface-deep);
                border-color: var(--border);
                color: var(--text-soft);
                box-shadow:
                    0 6px 16px rgba(0, 0, 0, 0.16),
                    inset 0 1px 0 rgba(255, 255, 255, 0.03);
            }
            button.btn-mini {
                padding: 5px 8px;
                font-size: 11px;
                border-radius: var(--radius-sm);
                background: transparent;
                border: 1px solid var(--warn);
                color: var(--warn-soft);
                box-shadow: none;
            }
            .base {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                font-weight: 800;
                line-height: 1;
                flex-shrink: 0;
                user-select: none;
            }
            .base-A {
                background: var(--A);
                color: var(--inverse-text);
            }
            .base-T {
                background: var(--T);
                color: var(--inverse-text);
            }
            .base-C {
                background: var(--C);
                color: #fff;
            }
            .base-G {
                background: var(--G);
                color: var(--inverse-text);
            }
            .base-sm {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }
            .editable-base {
                cursor: pointer;
                box-shadow: inset 0 0 0 1px transparent;
                transition:
                    transform 0.08s ease,
                    box-shadow 0.08s ease;
            }
            .editable-base:hover,
            .editable-base:focus-visible {
                transform: translateY(-1px);
                box-shadow:
                    inset 0 0 0 1px rgba(255, 255, 255, 0.35),
                    0 0 0 2px var(--accent-ring-strong);
                outline: none;
            }
            .result-helix {
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.015),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--surface);
                border: 1px solid var(--border-soft);
                border-radius: var(--radius-lg);
                margin-bottom: 12px;
                box-shadow:
                    0 14px 30px var(--shadow-soft),
                    inset 0 1px 0 rgba(255, 255, 255, 0.02);
                overflow: visible;
            }
            .result-header {
                display: flex;
                align-items: stretch;
                justify-content: space-between;
                gap: 14px;
                padding: 13px 15px;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.025),
                        rgba(255, 255, 255, 0)
                    ),
                    linear-gradient(
                        180deg,
                        var(--header-top),
                        var(--header-bottom)
                    );
                border-bottom: 1px solid var(--border-strong);
                border-top-left-radius: var(--radius-lg);
                border-top-right-radius: var(--radius-lg);
            }
            .result-header:only-child {
                border-bottom-left-radius: var(--radius-lg);
                border-bottom-right-radius: var(--radius-lg);
                border-bottom: none;
            }
            .result-heading {
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 3px;
                min-width: 0;
                flex: 1 1 auto;
            }
            .helix-title {
                font-weight: 800;
                font-size: 14px;
                letter-spacing: 0.01em;
                line-height: 1.25;
            }
            .helix-subtitle {
                color: var(--text-soft);
                font-size: 12px;
                font-weight: 600;
                opacity: 0.92;
            }
            .result-body {
                padding: 14px 16px 16px;
                border-bottom-left-radius: var(--radius-lg);
                border-bottom-right-radius: var(--radius-lg);
            }
            .strand-stack {
                display: flex;
                flex-direction: column;
                gap: 6px;
                align-items: flex-end;
                justify-content: center;
                flex: 0 0 auto;
                max-width: 58%;
            }
            .strand-row {
                display: flex;
                align-items: center;
                justify-content: flex-end;
                gap: 6px;
                flex-wrap: nowrap;
                min-height: 22px;
            }
            .strand-label {
                color: var(--chip-label);
                font-size: 10px;
                font-weight: 800;
                width: 24px;
                flex: 0 0 24px;
                text-align: right;
                letter-spacing: 0.06em;
            }
            .result-genes {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: stretch;
            }
            .result-gene {
                position: relative;
                z-index: 0;
                background:
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.018),
                        rgba(255, 255, 255, 0)
                    ),
                    var(--gene-card-bg);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                padding: 10px;
                min-width: 154px;
                cursor: pointer;
                text-align: left;
                color: inherit;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: flex-start;
                transition:
                    border-color 0.12s ease,
                    transform 0.08s ease,
                    box-shadow 0.12s ease;
            }
            .result-gene:hover,
            .result-gene:focus-visible {
                z-index: 20;
                border-color: var(--accent) !important;
                outline: none;
                transform: translateY(-1px);
                box-shadow:
                    0 0 0 3px var(--accent-soft),
                    0 10px 20px rgba(0, 0, 0, 0.18);
            }
            .result-gene .rpos {
                color: var(--dim);
                font-size: 10px;
                font-weight: 600;
                margin-top: 3px;
            }
            .result-gene .rname {
                font-size: 12px;
                font-weight: 800;
                margin: 0 0 2px;
                letter-spacing: 0.02em;
                line-height: 1.3;
            }
            .result-gene .rval {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
                font-size: 11px;
                margin-top: 8px;
            }
            .allele-line {
                display: flex;
                align-items: center;
                gap: 4px;
                flex-wrap: wrap;
            }
            .gene-mixed-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                margin-top: 8px;
                width: 100%;
            }
            .gene-warning {
                color: var(--warn-soft);
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.03em;
            }
            .gene-tooltip {
                position: absolute;
                left: 0;
                top: calc(100% + 8px);
                z-index: 21;
                width: min(360px, 65vw);
                padding: 10px 12px;
                background: var(--tooltip-bg);
                color: var(--text);
                border: 1px solid var(--accent);
                border-radius: var(--radius-md);
                box-shadow: 0 16px 32px var(--shadow-strong);
                font-size: 12px;
                line-height: 1.6;
                display: none;
                white-space: normal;
                pointer-events: none;
            }
            .gene-tooltip::before {
                content: "";
                position: absolute;
                top: -5px;
                left: 16px;
                width: 8px;
                height: 8px;
                background: var(--tooltip-bg);
                border-left: 1px solid var(--accent);
                border-top: 1px solid var(--accent);
                transform: rotate(45deg);
            }
            .tooltip-code {
                display: block;
                color: var(--accent);
                font-weight: 800;
                font-size: 11px;
                margin-bottom: 6px;
                letter-spacing: 0.04em;
            }
            .tooltip-values {
                display: block;
                color: var(--text-soft);
                font-size: 11px;
                margin-top: 6px;
            }
            .result-gene:hover .gene-tooltip,
            .result-gene:focus-visible .gene-tooltip {
                display: block;
            }
            .muted {
                color: var(--muted);
            }
            .dim {
                color: var(--dim);
            }
            @media (max-width: 720px) {
                .card-header,
                .result-header {
                    flex-direction: column;
                    align-items: flex-start;
                }
                .card-header-meta {
                    margin-left: 0;
                }
                .strand-stack {
                    align-items: flex-start;
                    max-width: 100%;
                    width: 100%;
                }
                .strand-row {
                    flex-wrap: wrap;
                    justify-content: flex-start;
                }
                .strand-label {
                    width: auto;
                    flex-basis: 100%;
                    text-align: left;
                }
            }
            ::-webkit-scrollbar {
                width: 8px;
            }
            ::-webkit-scrollbar-track {
                background: var(--scrollbar-track);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--scrollbar-thumb);
                border-radius: 999px;
            }
        </style>
    </head>

                    : [children]) {
                    if (child == null) continue;
                    if (typeof child === "string")
                        e.insertAdjacentHTML("beforeend", child);
                    else e.appendChild(child);
                }
                return e;
            }
            function sanitizeSequence(value) {
                return String(value || "")
                    .toUpperCase()
                    .replace(VALID_BASE_RE, "");
            }
            function normalizeGenome(genome) {
                return genome.map(([s1 = "", s2 = ""]) => [
                    sanitizeSequence(s1),
                    sanitizeSequence(s2),
                ]);
            }
            function cycleBase(base) {
                const i = BASES.indexOf(base);
                return BASES[(i + 1 + BASES.length) % BASES.length];
            }
            function baseChip(base, size = "sm") {
                return BASES.includes(base)
                    ? `<span class="base base-${base} base-${size}">${base}</span>`
                    : '<span class="muted">?</span>';
            }
            function valueColor(v) {
                if (v == null) return "var(--muted)";
                if (v > 0) return "var(--green-hi)";
                if (v < 0) return "var(--red-lo)";
                return "var(--muted)";
            }
            function getGeneValue(gene, base) {
                if (
                    !gene ||
                    !Object.prototype.hasOwnProperty.call(BASE_INDEX, base)
                )
                    return null;
                return gene.g[BASE_INDEX[base]];
            }
            function getHelixDisplayName(i) {
                return `Helix ${i}`;
            }
            function getHelixDescription(i) {
                return HELIX_DESCRIPTIONS[i] || "Unknown";
            }
            function alleleSummary(gene) {
                return `A=${gene.g[0]}, T=${gene.g[1]}, C=${gene.g[2]}, G=${gene.g[3]}`;
            }
            function getHelixIndexFactory() {
                const m = new Map();
                let next = 0;
                return (raw) => {
                    const label = String(raw).toUpperCase();
                    if (/^\d{1,2}$/.test(label)) {
                        const i = Number.parseInt(label, 10);
                        return i >= 0 && i < HELIX_COUNT ? i : -1;
                    }
                    if (!m.has(label)) {
                        if (next >= HELIX_COUNT) return -1;
                        m.set(label, next++);
                    }
                    return m.get(label);
                };
            }
            function parseGenome(text) {
                const genome = EMPTY_GENOME();
                const lines = String(text || "")
                    .trim()
                    .split("\n")
                    .map((l) => l.trim())
                    .filter(Boolean);
                const getHelixIndex = getHelixIndexFactory();
                let current = -1;
                const patterns = {
                    newFormat: /^([A-Za-z0-9]+)\s*:\s*([atcg]+)$/i,
                    numbered: /^(\d{1,2})\s*:\s*([atcg]+)$/i,
                    verboseBoth:
                        /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)\s*:\s*(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                    verboseFirst:
                        /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)$/i,
                    verboseSecond:
                        /^(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                    bareStrand: /^[atcg]+$/i,
                };
                function assign(i, seq) {
                    if (i < 0 || i >= HELIX_COUNT) return;
                    if (!genome[i][0]) genome[i][0] = seq;
                    else genome[i][1] = seq;
                }
                for (const line of lines) {
                    let match = line.match(patterns.newFormat);
                    if (match) {
                        assign(getHelixIndex(match[1]), match[2].toUpperCase());
                        continue;
                    }
                    match = line.match(patterns.numbered);
                    if (match) {
                        assign(
                            Number.parseInt(match[1], 10),
                            match[2].toUpperCase(),
                        );
                        continue;
                    }
                    match = line.match(patterns.verboseBoth);
                    if (match) {
                        current = getHelixIndex(match[1]);
                        if (current >= 0) {
                            genome[current][0] = match[2].toUpperCase();
                            genome[current][1] = match[3].toUpperCase();
                        }
                        continue;
                    }
                    match = line.match(patterns.verboseFirst);
                    if (match) {
                        current = getHelixIndex(match[1]);
                        if (current >= 0)
                            genome[current][0] = match[2].toUpperCase();
                        continue;
                    }
                    match = line.match(patterns.verboseSecond);
                    if (match && current >= 0) {
                        genome[current][1] = match[1].toUpperCase();
                        continue;
                    }
                    if (
                        current >= 0 &&
                        !genome[current][1] &&
                        patterns.bareStrand.test(line)
                    )
                        genome[current][1] = line.toUpperCase();
                }
                return normalizeGenome(genome);
            }
            function formatGenomeForExport(genome) {
                const lines = [];
                genome.forEach(([s1, s2], i) => {
                    const label = String(i).padStart(2, "0");
                    if (s1) lines.push(`${label}:${s1}`);
                    if (s2) lines.push(`${label}:${s2}`);
                });
                return lines.join("\n");
            }
            function createEditableBase(base, onActivate, label) {
                const b = createElement("button", {
                    type: "button",
                    class: `base base-${base} base-sm editable-base`,
                    title: label,
                    "aria-label": label,
                    text: base,
                });
                b.addEventListener("click", (e) => {
                    e.stopPropagation();
                    onActivate();
                });
                return b;
            }
            function createApp(root) {
                const state = { genome: EMPTY_GENOME(), autoCopy: false };
                const inputCard = createElement("div", {
                    class: "card card-with-header",
                });
                const inputHeader = createElement(
                    "div",
                    { class: "card-header" },
                    [
                        createElement("div", {
                            class: "card-header-title",
                            text: "Horsey C.R.I.S.P.R Editor",
                        }),
                        createElement("div", { class: "card-header-meta" }, [
                            createElement("span", {
                                html: '<b style="color: var(--A)">A</b> = Yellow',
                            }),
                            createElement("span", {
                                html: '<b style="color: var(--T)">T</b> = Red',
                            }),
                            createElement("span", {
                                html: '<b style="color: var(--C)">C</b> = Blue',
                            }),
                            createElement("span", {
                                html: '<b style="color: var(--G)">G</b> = Green',
                            }),
                        ]),
                    ],
                );
                const inputContent = createElement("div", {
                    class: "card-content",
                });
                const inputField = createElement("div", { class: "field" }, [
                    createElement("label", {
                        text: "Paste genome (20 helices, both strands)",
                    }),
                ]);
                const genomeInput = createElement("textarea", {
                    rows: "8",
                    placeholder: `00:TTTTTTTTTT\n00:CCCCCCCCCC\n01:AAAAAAAAAAAAA\n01:GGGGGGGGGGGGG\n\n(or older formats also work)`,
                });
                inputField.appendChild(genomeInput);
                inputContent.appendChild(inputField);
                inputCard.appendChild(inputHeader);
                inputCard.appendChild(inputContent);
                const analyzeButton = createElement("button", {
                    class: "btn",
                    text: "Analyze Genome",
                });
                const loadBlankButton = createElement("button", {
                    class: "btn btn-ghost",
                    text: "Load Blank Editor",
                });
                const randomizeButton = createElement("button", {
                    class: "btn btn-ghost",
                    text: "Randomize Genome",
                });
                const mergeAllButton = createElement("button", {
                    class: "btn btn-ghost",
                    text: "Merge All",
                });
                const clearButton = createElement("button", {
                    class: "btn btn-ghost",
                    text: "Clear",
                });
                const copyButton = createElement("button", {
                    class: "btn btn-ghost",
                    text: "Copy Genome",
                });
                const autoCopyCheckbox = createElement("input", {
                    type: "checkbox",
                    checked: state.autoCopy,
                    "aria-label": "Automatically copy genome after changes",
                });
                const autoCopyToggle = createElement(
                    "label",
                    { class: "toggle-option" },
                    [
                        autoCopyCheckbox,
                        createElement("span", { text: "Auto-copy on edit" }),
                    ],
                );
                inputContent.appendChild(
                    createElement("div", { class: "button-row" }, [
                        analyzeButton,
                        loadBlankButton,
                        randomizeButton,
                        mergeAllButton,
                        clearButton,
                        copyButton,
                        autoCopyToggle,
                    ]),
                );
                const resultsRoot = createElement("div");
                root.innerHTML = "";
                root.appendChild(inputCard);
                root.appendChild(resultsRoot);
                function syncTextAreaFromState() {
                    genomeInput.value = formatGenomeForExport(state.genome);
                }
                function setCopyButtonLabel(label) {
                    copyButton.textContent = label;
                }
                async function copyGenomeToClipboard({
                    temporaryLabel = true,
                } = {}) {
                    syncTextAreaFromState();
                    try {
                        await navigator.clipboard.writeText(genomeInput.value);
                        if (temporaryLabel) {
                            setCopyButtonLabel("Copied");
                            window.setTimeout(
                                () => setCopyButtonLabel("Copy Genome"),
                                1200,
                            );
                        }
                        return true;
                    } catch {
                        if (temporaryLabel) {
                            genomeInput.focus();
                            genomeInput.select();
                            setCopyButtonLabel("Select & Copy");
                            window.setTimeout(
                                () => setCopyButtonLabel("Copy Genome"),
                                1200,
                            );
                        }
                        return false;
                    }
                }
                function maybeAutoCopy() {
                    if (state.autoCopy)
                        void copyGenomeToClipboard({ temporaryLabel: true });
                }
                function setBase(hi, si, bi, nextBase) {
                    const strand = state.genome[hi][si] || "";
                    const chars = strand.split("");
                    chars[bi] = nextBase;
                    state.genome[hi][si] = chars.join("");
                }
                function cycleGeneAt(hi, gi) {
                    const [s1, s2] = state.genome[hi];
                    const b1 = s1?.[gi];
                    const b2 = s2?.[gi];
                    if (!b1 && !b2) return;
                    if (b1 && b2 && b1 === b2) {
                        const n = cycleBase(b1);
                        setBase(hi, 0, gi, n);
                        setBase(hi, 1, gi, n);
                    } else if (b1 && !b2) setBase(hi, 0, gi, cycleBase(b1));
                    else if (!b1 && b2) setBase(hi, 1, gi, cycleBase(b2));
                    render();
                    maybeAutoCopy();
                }
                function mergeGeneAlleles(hi, gi, { silent = false } = {}) {
                    const [s1, s2] = state.genome[hi];
                    const b1 = s1?.[gi];
                    const b2 = s2?.[gi];
                    if (!b1 && !b2) return;
                    const merged = b1 || b2;
                    if (b1) setBase(hi, 0, gi, merged);
                    if (b2) setBase(hi, 1, gi, merged);
                    if (!silent) {
                        render();
                        maybeAutoCopy();
                    }
                }
                function hasMergeableAlleles() {
                    return HELIX_MAP.some((genes, hi) => {
                        const [s1 = "", s2 = ""] = state.genome[hi] || ["", ""];
                        return genes.some((_, gi) =>
                            Boolean(s1[gi] && s2[gi] && s1[gi] !== s2[gi]),
                        );
                    });
                }
                function mergeAllAlleles() {
                    HELIX_MAP.forEach((genes, hi) =>
                        genes.forEach((_, gi) => {
                            const [s1 = "", s2 = ""] = state.genome[hi] || [
                                "",
                                "",
                            ];
                            if (s1[gi] && s2[gi] && s1[gi] !== s2[gi])
                                mergeGeneAlleles(hi, gi, { silent: true });
                        }),
                    );
                }
                function cycleStrandBase(hi, si, bi) {
                    const strand = state.genome[hi][si] || "";
                    if (!strand[bi]) return;
                    setBase(hi, si, bi, cycleBase(strand[bi]));
                    render();
                    maybeAutoCopy();
                }
                function buildStrandPreviewRow(label, strand, hi, si) {
                    const row = createElement("div", { class: "strand-row" }, [
                        createElement("span", {
                            class: "strand-label",
                            text: label,
                        }),
                    ]);
                    strand
                        .split("")
                        .forEach((base, bi) =>
                            row.appendChild(
                                createEditableBase(
                                    base,
                                    () => cycleStrandBase(hi, si, bi),
                                    `${getHelixDisplayName(hi)} strand ${si + 1} position ${bi + 1}. Click to cycle base.`,
                                ),
                            ),
                        );
                    return row;
                }
                function buildStrandStack(hi, s1, s2) {
                    const stack = createElement("div", {
                        class: "strand-stack",
                    });
                    if (s1)
                        stack.appendChild(
                            buildStrandPreviewRow("S1", s1, hi, 0),
                        );
                    if (s2)
                        stack.appendChild(
                            buildStrandPreviewRow("S2", s2, hi, 1),
                        );
                    return stack;
                }
                function renderResults() {
                    resultsRoot.innerHTML = "";
                    HELIX_MAP.forEach((genes, hi) => {
                        const [s1, s2] = state.genome[hi] || ["", ""];
                        const hasData = Boolean(s1 || s2);
                        const helixBlock = createElement("div", {
                            class: "result-helix",
                        });
                        const header = createElement("div", {
                            class: "result-header",
                        });
                        const heading = createElement(
                            "div",
                            { class: "result-heading" },
                            [
                                createElement("div", {
                                    class: "helix-title",
                                    text: getHelixDisplayName(hi),
                                }),
                                createElement("div", {
                                    class: "helix-subtitle",
                                    text: getHelixDescription(hi),
                                }),
                            ],
                        );
                        header.appendChild(heading);
                        if (hasData)
                            header.appendChild(buildStrandStack(hi, s1, s2));
                        else
                            header.appendChild(
                                createElement("span", {
                                    class: "dim",
                                    text: "no data",
                                    style: "font-size:11px;align-self:center;",
                                }),
                            );
                        helixBlock.appendChild(header);
                        if (hasData) {
                            const body = createElement("div", {
                                class: "result-body",
                            });
                            const geneList = createElement("div", {
                                class: "result-genes",
                            });
                            genes.forEach((geneName, gi) => {
                                const gene = GENES[geneName];
                                const humanName =
                                    GENE_HUMAN_NAMES[geneName] || geneName;
                                const categoryColor = gene
                                    ? CAT_COLOR[gene.cat] || "#64748b"
                                    : "#475569";
                                const b1 = s1?.[gi]?.toUpperCase();
                                const b2 = s2?.[gi]?.toUpperCase();
                                const v1 = getGeneValue(gene, b1);
                                const v2 = getGeneValue(gene, b2);
                                const isMixed = Boolean(b1 && b2) && b1 !== b2;
                                const tooltip = [
                                    createElement("span", {
                                        class: "tooltip-code",
                                        text: geneName,
                                    }),
                                ];
                                tooltip.push(
                                    createElement("span", {
                                        text:
                                            gene?.desc ||
                                            "No custom description yet.",
                                    }),
                                );
                                if (gene)
                                    tooltip.push(
                                        createElement("span", {
                                            class: "tooltip-values",
                                            text: `Wiki values: ${alleleSummary(gene)}. Baseline m=${gene.m}, scale s=${gene.s}.`,
                                        }),
                                    );
                                const card = createElement("button", {
                                    type: "button",
                                    class: "result-gene",
                                    style: `border-color:${categoryColor}33`,
                                    title: geneName,
                                    "aria-label": `Gene ${geneName} on ${getHelixDisplayName(hi)} position ${gi + 1}.`,
                                });
                                if (!isMixed)
                                    card.addEventListener("click", () =>
                                        cycleGeneAt(hi, gi),
                                    );
                                card.appendChild(
                                    createElement("div", {
                                        class: "rname",
                                        text: humanName,
                                        style: `color:${categoryColor}`,
                                    }),
                                );
                                card.appendChild(
                                    createElement("div", {
                                        class: "rpos",
                                        text: `${getHelixDisplayName(hi)} · P${gi}`,
                                    }),
                                );
                                const valueRow = createElement("div", {
                                    class: "rval",
                                });
                                if (b1)
                                    valueRow.appendChild(
                                        createElement(
                                            "div",
                                            { class: "allele-line" },
                                            `${createElement("span", { class: "dim", text: isMixed ? "S1:" : "Allele:" }).outerHTML}${baseChip(b1)}<span class="muted">=</span><span style="color:${valueColor(v1)};font-weight:bold">${v1}</span>`,
                                        ),
                                    );
                                if (isMixed && b2)
                                    valueRow.appendChild(
                                        createElement(
                                            "div",
                                            { class: "allele-line" },
                                            `${createElement("span", { class: "dim", text: "S2:" }).outerHTML}${baseChip(b2)}<span class="muted">=</span><span style="color:${valueColor(v2)};font-weight:bold">${v2}</span>`,
                                        ),
                                    );
                                if (!b1 && !b2)
                                    valueRow.appendChild(
                                        createElement("span", {
                                            class: "dim",
                                            text: "—",
                                        }),
                                    );
                                card.appendChild(valueRow);
                                if (isMixed) {
                                    const mixedRow = createElement(
                                        "div",
                                        { class: "gene-mixed-row" },
                                        [
                                            createElement("span", {
                                                class: "gene-warning",
                                                text: "MIXED ALLELES",
                                            }),
                                        ],
                                    );
                                    const mergeButton = createElement(
                                        "button",
                                        {
                                            type: "button",
                                            class: "btn-mini",
                                            text: "Merge",
                                        },
                                    );
                                    mergeButton.addEventListener(
                                        "click",
                                        (event) => {
                                            event.stopPropagation();
                                            mergeGeneAlleles(hi, gi);
                                        },
                                    );
                                    mixedRow.appendChild(mergeButton);
                                    card.appendChild(mixedRow);
                                }
                                card.appendChild(
                                    createElement(
                                        "div",
                                        { class: "gene-tooltip" },
                                        tooltip,
                                    ),
                                );
                                geneList.appendChild(card);
                            });
                            body.appendChild(geneList);
                            helixBlock.appendChild(body);
                        }
                        resultsRoot.appendChild(helixBlock);
                    });
                }
                function render() {
                    syncTextAreaFromState();
                    mergeAllButton.style.display = hasMergeableAlleles()
                        ? ""
                        : "none";
                    renderResults();
                }
                function randomBase() {
                    return BASES[Math.floor(Math.random() * BASES.length)];
                }
                function randomGenome() {
                    return Array.from({ length: HELIX_COUNT }, (_, hi) => {
                        const n = HELIX_MAP[hi]?.length ?? 0;
                        return [
                            Array.from({ length: n }, randomBase).join(""),
                            Array.from({ length: n }, randomBase).join(""),
                        ];
                    });
                }
                analyzeButton.addEventListener("click", () => {
                    state.genome = parseGenome(genomeInput.value);
                    render();
                });
                loadBlankButton.addEventListener("click", () => {
                    state.genome = makeUniformGenome("A");
                    render();
                });
                randomizeButton.addEventListener("click", () => {
                    state.genome = randomGenome();
                    render();
                    maybeAutoCopy();
                });
                mergeAllButton.addEventListener("click", () => {
                    mergeAllAlleles();
                    render();
                    maybeAutoCopy();
                });
                copyButton.addEventListener("click", async () => {
                    await copyGenomeToClipboard({ temporaryLabel: true });
                });
                autoCopyCheckbox.addEventListener("change", () => {
                    state.autoCopy = autoCopyCheckbox.checked;
                });
                clearButton.addEventListener("click", () => {
                    state.genome = EMPTY_GENOME();
                    genomeInput.value = "";
                    render();
                });
                render();
            }
            createApp(document.getElementById("editor"));
        </script>
    </body>
</html>
